<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ghost Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #0d0d0d;
      --panel:     #0b0b0b;
      --border:    #1c1c1c;
      --border2:   #272727;
      --text:      #f2f2f2;
      --muted:     #3c3c3c;
      --dim:       #909090;
      --amber:     #f0a340;
      --amber-dim: rgba(240,163,64,0.11);
      --green:     #3ddc84;
      --red:       #ff453a;
      --font-ui:   'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ──────────────────────────────────────── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(14px, env(safe-area-inset-top)) 18px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status-dot.connected    { background: var(--green); animation: pulse 2.4s ease-in-out infinite; }
    #status-dot.disconnected { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #status-text {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── Textarea ────────────────────────────────────────── */
    #note {
      flex: 1;
      width: 100%;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 16px;
      line-height: 1.75;
      border: none;
      outline: none;
      resize: none;
      caret-color: var(--amber);
      -webkit-appearance: none;
    }

    #note::placeholder { color: var(--muted); }

    /* ── Controls panel ──────────────────────────────────── */
    #controls {
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Position grid ───────────────────────────────────── */
    #pos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Action row ──────────────────────────────────────── */
    #action-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 46px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--dim);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.12s, color 0.12s, transform 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.1);
      color: var(--text);
      transform: scale(0.92);
    }

    @media (hover: hover) {
      .btn:hover {
        background: rgba(255,255,255,0.05);
        border-color: rgba(255,255,255,0.09);
        color: var(--text);
      }
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .pos-btn { width: 100%; }

    /* Clear */
    #clear-btn {
      flex: 1;
      color: rgba(255,67,58,0.35);
    }
    #clear-btn:active {
      color: var(--red);
      border-color: rgba(255,67,58,0.28);
      background: rgba(255,67,58,0.07);
    }
    @media (hover: hover) {
      #clear-btn:hover {
        color: var(--red);
        border-color: rgba(255,67,58,0.22);
        background: rgba(255,67,58,0.05);
      }
    }

    /* MD toggle */
    #md-btn { min-width: 54px; }
    #md-btn.active {
      color: var(--amber);
      border-color: rgba(240,163,64,0.32);
      background: var(--amber-dim);
    }

    /* Scroll */
    #scroll-up-btn,
    #scroll-down-btn { min-width: 54px; }
  </style>
</head>
<body>

  <div id="status-bar">
    <div id="status">
      <span id="status-dot"></span>
      <span id="status-text">connecting</span>
    </div>
  </div>

  <textarea id="note" placeholder="start typing…" autofocus spellcheck="false"></textarea>

  <div id="controls">
    <div id="pos-grid">
      <button class="btn pos-btn" data-pos="top-left" title="Top-left">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="11" y1="11" x2="5" y2="5"/><polyline points="5,9 5,5 9,5"/>
        </svg>
      </button>
      <button class="btn pos-btn" data-pos="top-center" title="Top-center">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="12" x2="8" y2="4"/><polyline points="5,7 8,4 11,7"/>
        </svg>
      </button>
      <button class="btn pos-btn" data-pos="top-right" title="Top-right">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="11" x2="11" y2="5"/><polyline points="7,5 11,5 11,9"/>
        </svg>
      </button>
      <button class="btn pos-btn" data-pos="bottom-left" title="Bottom-left">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="11" y1="5" x2="5" y2="11"/><polyline points="5,7 5,11 9,11"/>
        </svg>
      </button>
      <button class="btn pos-btn" data-pos="bottom-center" title="Bottom-center">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="4" x2="8" y2="12"/><polyline points="5,9 8,12 11,9"/>
        </svg>
      </button>
      <button class="btn pos-btn" data-pos="bottom-right" title="Bottom-right">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="5" x2="11" y2="11"/><polyline points="11,7 11,11 7,11"/>
        </svg>
      </button>
    </div>
    <div id="action-row">
      <button class="btn" id="clear-btn" title="Clear overlay">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/>
          <path d="M4 4l.8 8.4A1 1 0 005.8 13h4.4a1 1 0 001-.96L12 4"/>
        </svg>
        clear
      </button>
      <button class="btn" id="md-btn" title="Toggle markdown">MD</button>
      <button class="btn" id="scroll-up-btn" title="Scroll up">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,10 8,6 12,10"/>
        </svg>
      </button>
      <button class="btn" id="scroll-down-btn" title="Scroll down">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,6 8,10 12,6"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const noteEl       = document.getElementById('note');
    const statusDot    = document.getElementById('status-dot');
    const statusText   = document.getElementById('status-text');
    const clearBtn     = document.getElementById('clear-btn');

    const host = location.host;
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      ws = new WebSocket(`ws://${host}/sender`);

      ws.addEventListener('open', () => {
        statusDot.className = 'connected';
        statusText.textContent = 'live';
        clearTimeout(reconnectTimer);
        send({ type: 'note', content: noteEl.value });
      });

      ws.addEventListener('close', () => {
        statusDot.className = 'disconnected';
        statusText.textContent = 'offline';
        reconnectTimer = setTimeout(connect, 3000);
      });

      ws.addEventListener('error', () => ws.close());

      ws.addEventListener('message', () => {});
    }

    function send(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
    }

    noteEl.addEventListener('input', () => send({ type: 'note', content: noteEl.value }));

    document.querySelectorAll('.pos-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pos = btn.dataset.pos;
        send({ type: 'move', position: pos });
        send({ type: 'direction', from: pos.startsWith('top') ? 'top' : 'bottom' });
      });
    });

    document.getElementById('scroll-up-btn').addEventListener('click',   () => send({ type: 'scroll', delta: -120 }));
    document.getElementById('scroll-down-btn').addEventListener('click',  () => send({ type: 'scroll', delta:  120 }));

    let mdEnabled = localStorage.getItem('md-enabled') !== 'false';
    const mdBtn = document.getElementById('md-btn');

    function applyMdStyle() { mdBtn.classList.toggle('active', mdEnabled); }
    applyMdStyle();

    mdBtn.addEventListener('click', () => {
      mdEnabled = !mdEnabled;
      localStorage.setItem('md-enabled', mdEnabled);
      applyMdStyle();
      send({ type: 'markdown', enabled: mdEnabled });
    });

    clearBtn.addEventListener('click', () => {
      noteEl.value = '';
      send({ type: 'clear' });
      noteEl.focus();
    });

    connect();
  </script>
</body>
</html>
