<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stealth Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #090909;
      --surface: #0d0d0d;
      --border:  #1c1c1c;
      --border2: #252525;
      --text:    #d8d8d8;
      --muted:   #3a3a3a;
      --dim:     #505050;
      --green:   #3ddc84;
      --red:     #ff453a;
      --font:    'Space Mono', monospace;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      padding-top: max(14px, env(safe-area-inset-top));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #status-dot.connected    { background: var(--green); animation: pulse 2.4s ease-in-out infinite; }
    #status-dot.disconnected { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #status-text {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--dim);
    }

    #overlay-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--dim);
      padding: 2px 8px;
      border: 1px solid var(--border2);
      border-radius: 3px;
    }

    /* ── Controls strip ─────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .controls::-webkit-scrollbar { display: none; }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-group:last-child { border-right: none; }

.c-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--dim);
      font-family: var(--font);
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .c-btn:active {
      background: rgba(255,255,255,0.07);
      border-color: var(--border2);
      color: var(--text);
    }

    @media (hover: hover) {
      .c-btn:hover {
        background: rgba(255,255,255,0.05);
        border-color: var(--border2);
        color: var(--text);
      }
    }

    #clear-btn {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3d1818;
      min-width: 60px;
    }

    #clear-btn:active {
      color: var(--red);
      border-color: #3d1818;
      background: rgba(255,67,58,0.07);
    }

    @media (hover: hover) {
      #clear-btn:hover {
        color: var(--red);
        border-color: #3d1818;
        background: rgba(255,67,58,0.05);
      }
    }

    .c-btn svg {
      width: 20px;
      height: 20px;
    }

    /* ── Textarea ────────────────────────────────────────────── */
    #note {
      flex: 1;
      width: 100%;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px; /* 16px prevents iOS auto-zoom */
      line-height: 1.8;
      border: none;
      outline: none;
      resize: none;
      caret-color: var(--green);
      -webkit-appearance: none;
    }

    #note::placeholder {
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <span class="wordmark">Stealth Notes</span>
    <div class="header-right">
      <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">connecting</span>
      </div>
      <div id="overlay-count">0 overlays</div>
    </div>
  </header>

  <div class="controls">
    <!-- Clear -->
    <div class="ctrl-group">
      <button class="c-btn" id="clear-btn" title="Clear overlay">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/>
          <path d="M4 4l.8 8.4A1 1 0 005.8 13h4.4a1 1 0 001-.96L12 4"/>
        </svg>
      </button>
    </div>
    <!-- Move to corner -->
    <div class="ctrl-group">
      <button class="c-btn pos-btn" data-pos="top-left" title="Top-left">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="11" y1="11" x2="5" y2="5"/><polyline points="5,9 5,5 9,5"/>
        </svg>
      </button>
      <button class="c-btn pos-btn" data-pos="top-right" title="Top-right">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="11" x2="11" y2="5"/><polyline points="7,5 11,5 11,9"/>
        </svg>
      </button>
      <button class="c-btn pos-btn" data-pos="bottom-left" title="Bottom-left">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="11" y1="5" x2="5" y2="11"/><polyline points="5,7 5,11 9,11"/>
        </svg>
      </button>
      <button class="c-btn pos-btn" data-pos="bottom-right" title="Bottom-right">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="5" x2="11" y2="11"/><polyline points="11,7 11,11 7,11"/>
        </svg>
      </button>
    </div>
    <!-- Scroll -->
    <div class="ctrl-group" style="border-right:none;">
      <button class="c-btn" id="scroll-up-btn" title="Scroll up">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,10 8,6 12,10"/>
        </svg>
      </button>
      <button class="c-btn" id="scroll-down-btn" title="Scroll down">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4,6 8,10 12,6"/>
        </svg>
      </button>
    </div>
  </div>

  <textarea id="note" placeholder="start typing — streams to the overlay in real time" autofocus></textarea>

  <script>
    const noteEl       = document.getElementById('note');
    const statusDot    = document.getElementById('status-dot');
    const statusText   = document.getElementById('status-text');
    const clearBtn     = document.getElementById('clear-btn');
    const overlayCount = document.getElementById('overlay-count');

    const host = location.host;

    let ws = null;
    let reconnectTimer = null;

    function connect() {
      ws = new WebSocket(`ws://${host}/sender`);

      ws.addEventListener('open', () => {
        statusDot.className = 'connected';
        statusText.textContent = 'live';
        clearTimeout(reconnectTimer);
        send({ type: 'note', content: noteEl.value });
      });

      ws.addEventListener('close', () => {
        statusDot.className = 'disconnected';
        statusText.textContent = 'offline';
        reconnectTimer = setTimeout(connect, 3000);
      });

      ws.addEventListener('error', () => ws.close());

      ws.addEventListener('message', (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'overlay_count') {
            const n = msg.count;
            overlayCount.textContent = `${n} overlay${n !== 1 ? 's' : ''}`;
          }
        } catch {}
      });
    }

    function send(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
    }

    noteEl.addEventListener('input', () => {
      send({ type: 'note', content: noteEl.value });
    });

    document.querySelectorAll('.pos-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const pos = btn.dataset.pos;
        send({ type: 'move', position: pos });
        send({ type: 'direction', from: pos.startsWith('top') ? 'top' : 'bottom' });
      });
    });

    document.getElementById('scroll-up-btn').addEventListener('click',  () => send({ type: 'scroll', delta: -120 }));
    document.getElementById('scroll-down-btn').addEventListener('click', () => send({ type: 'scroll', delta:  120 }));

    clearBtn.addEventListener('click', () => {
      noteEl.value = '';
      send({ type: 'clear' });
      noteEl.focus();
    });

    connect();
  </script>
</body>
</html>
